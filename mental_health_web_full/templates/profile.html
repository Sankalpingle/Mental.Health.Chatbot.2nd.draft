{% extends "base.html" %}
{% block title %}Profile — Mindful Chat{% endblock %}
{% block content %}
<section class="page-header">
    <h1>Profile</h1>
    <p>Customize your experience</p>
</section>
<section class="profile-section">
    <form method="POST" class="profile-form">
        <label for="bio">Bio (optional)</label>
        <textarea id="bio" name="bio" rows="4" placeholder="A few words about yourself...">{{ profile.bio or '' }}</textarea>
        <label for="preferences">Preferences (optional)</label>
        <input type="text" id="preferences" name="preferences" placeholder="e.g. Prefer calm responses" value="{{ profile.preferences or '' }}">
        <button type="submit" class="btn btn-primary">Save Profile</button>
    </form>
</section>
{% endblock %}
